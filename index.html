<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chaajao">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="./manifest.json">
<title>Chaajao Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --gold2: #E8C76A;
  --gold3: #A07830;
  --gold-dim: rgba(201,168,76,0.10);
  --gold-glow: rgba(201,168,76,0.20);
  --bg: #080808;
  --bg2: #111111;
  --bg3: #181818;
  --bg4: #202020;
  --glass: rgba(255,255,255,0.04);
  --glass2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-gold: rgba(201,168,76,0.25);
  --text: #F2EEE8;
  --text2: #888880;
  --text3: #555550;
  --green: #4ADE80;
  --red: #F87171;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(70px + var(--safe-bottom));
  padding-top: calc(60px + var(--safe-top));
  font-size: 14px;
}

/* ─── NOISE OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.4;
}

/* ─── TOPBAR ─── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: calc(60px + var(--safe-top));
  padding-top: var(--safe-top);
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding-left: 18px; padding-right: 18px;
}

.brand {
  display: flex; align-items: center; gap: 10px;
}
.brand-mark {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold2), var(--gold3));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(201,168,76,0.3);
}
.brand-mark svg { width: 18px; height: 18px; fill: #080808; }
.brand-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-tag {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text3); font-weight: 500;
  display: none;
}

.tb-actions { display: flex; align-items: center; gap: 6px; }
.tb-date {
  font-size: 11px; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
  font-weight: 500; letter-spacing: .3px;
}
.icon-btn {
  width: 34px; height: 34px; border-radius: 9px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.icon-btn:active { background: var(--bg4); color: var(--gold); border-color: var(--border-gold); }
.icon-btn svg { width: 14px; height: 14px; fill: currentColor; }

/* ─── OFFLINE BANNER ─── */
#offline-banner {
  position: fixed; top: calc(60px + var(--safe-top));
  left: 0; right: 0; z-index: 199;
  background: rgba(201,168,76,0.1);
  border-bottom: 1px solid var(--border-gold);
  padding: 9px 18px;
  display: none; align-items: center; gap: 8px;
}
#offline-banner.show { display: flex; }
.offline-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.offline-text { font-size: 12px; color: var(--gold2); font-weight: 500; }

/* ─── BOTTOM NAV ─── */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  height: calc(62px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(8,8,8,0.96);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
}

.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; border: none; background: none;
  color: var(--text3); transition: color .2s;
  font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  position: relative;
}
.nav-item svg { width: 20px; height: 20px; fill: currentColor; transition: transform .2s; }
.nav-item::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 0; height: 2px; background: var(--gold);
  transition: width .25s cubic-bezier(.4,0,.2,1);
  border-radius: 2px 2px 0 0;
}
.nav-item.active { color: var(--gold); }
.nav-item.active::after { width: 24px; }
.nav-item.active svg { transform: translateY(-1px); }
.nav-item:active { opacity: .6; }

/* ─── PAGES ─── */
.page { display: none; flex-direction: column; gap: 14px; padding: 16px 14px; position: relative; z-index: 1; }
.page.active { display: flex; animation: fadeIn .25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ─── LOADING ─── */
#loading-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 55vh; gap: 20px; text-align: center; padding: 40px;
}
.spinner-wrap { position: relative; width: 44px; height: 44px; }
.spinner-ring {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--border-gold);
  border-top-color: var(--gold);
  animation: spin .8s linear infinite;
  position: absolute; inset: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--gold);
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  box-shadow: 0 0 12px var(--gold);
}
.loading-title { font-size: 15px; font-weight: 500; color: var(--text2); }
.loading-sub { font-size: 12px; color: var(--text3); font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; }

/* ─── ERROR ─── */
#error-screen {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; min-height: 55vh; gap: 14px; text-align: center; padding: 40px;
}
.error-icon { font-size: 40px; }
.error-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--text); }
.error-msg { font-size: 13px; color: var(--text2); max-width: 260px; line-height: 1.7; }
.btn-retry {
  background: linear-gradient(135deg, var(--gold2), var(--gold3));
  color: #080808; border: none; border-radius: 10px;
  padding: 11px 28px; font-size: 13px; font-weight: 700; cursor: pointer;
  letter-spacing: .5px; margin-top: 6px;
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}

/* ─── SECTION LABELS ─── */
.sec-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 3px; color: var(--text3);
  padding: 0 2px; display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ─── HERO TOTAL CARD ─── */
.hero-card {
  background: var(--bg2);
  border: 1px solid var(--border-gold);
  border-radius: 18px;
  padding: 24px 22px;
  position: relative; overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute; top: -60px; right: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.hero-label {
  font-size: 10px; font-weight: 600; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--gold3); margin-bottom: 10px;
}
.hero-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px; letter-spacing: -1px; line-height: 1;
  background: linear-gradient(135deg, #fff 40%, var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-meta {
  display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap;
}
.hero-delta {
  font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px;
}
.hero-date {
  font-size: 11px; color: var(--text3); margin-left: auto;
  font-weight: 500;
}

/* ─── PLATFORM GRID ─── */
.plat-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px;
}
.plat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 11px;
  position: relative; overflow: hidden;
  transition: border-color .2s;
}
.plat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--pc, #555);
  opacity: 0.8;
}
.plat-icon {
  width: 28px; height: 28px; border-radius: 7px;
  background: color-mix(in srgb, var(--pc, #555) 15%, transparent);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 9px;
}
.plat-icon svg { width: 14px; height: 14px; fill: var(--pc, #fff); }
.plat-name { font-size: 10px; color: var(--text2); font-weight: 500; margin-bottom: 5px; letter-spacing: .2px; }
.plat-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .5px; color: #fff; line-height: 1; margin-bottom: 5px; }
.plat-delta { font-size: 10px; font-weight: 600; }
.up { color: var(--green); }
.dn { color: var(--red); }
.neu { color: var(--text3); }

/* ─── PILL ─── */
.pill {
  font-size: 10px; font-weight: 600; padding: 3px 8px;
  border-radius: 20px; display: inline-flex; align-items: center; gap: 3px;
  white-space: nowrap;
}
.pill.up { background: rgba(74,222,128,0.1); color: var(--green); }
.pill.dn { background: rgba(248,113,113,0.1); color: var(--red); }
.pill.neu { background: var(--bg4); color: var(--text3); }

/* ─── WEEKLY CARDS ─── */
.week-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 14px;
}
.week-head {
  display: flex; align-items: center; gap: 9px; margin-bottom: 14px;
}
.week-head-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.week-head-icon svg { width: 15px; height: 15px; }
.week-head-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.week-cols {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
}
.week-col {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 8px; text-align: center;
}
.week-col.current {
  background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
  border-color: var(--border-gold);
}
.week-col-date { font-size: 9px; color: var(--text3); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; }
.week-col.current .week-col-date { color: var(--gold3); }
.week-col-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #fff; letter-spacing: .5px; }
.week-col.current .week-col-val { font-size: 22px; color: var(--gold2); }
.week-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
}
.week-footer-lbl { font-size: 11px; color: var(--text3); font-weight: 500; }
.week-footer-val { font-size: 14px; font-weight: 700; }

/* ─── GROWTH SUMMARY ─── */
.growth-box {
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
  border: 1px solid var(--border-gold);
  border-radius: 14px; padding: 20px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.growth-box-left {}
.growth-label { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.growth-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 1px; line-height: 1;
}
.growth-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }
.growth-icon {
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(201,168,76,0.12); border: 1px solid var(--border-gold);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.growth-icon svg { width: 24px; height: 24px; fill: var(--gold); }

/* ─── MONTHLY ─── */
.month-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 14px;
}
.month-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 12px;
}
.month-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: #fff;
}
.month-total-num { font-size: 14px; font-weight: 700; color: var(--text); text-align: right; }
.month-total-delta { font-size: 11px; font-weight: 600; text-align: right; }
.month-divider { height: 1px; background: var(--border); margin: 8px 0; }
.month-row {
  display: flex; align-items: center; gap: 8px; padding: 5px 0;
}
.month-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.month-nm { font-size: 12px; color: var(--text2); flex: 1; font-weight: 400; }
.month-val { font-size: 12px; font-weight: 600; color: var(--text); min-width: 60px; text-align: right; }
.month-chg { font-size: 11px; font-weight: 600; min-width: 70px; text-align: right; }

/* ─── CHART CARDS ─── */
.chart-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 14px;
}
.chart-head {
  display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px;
}
.chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: #fff; }
.chart-sub { font-size: 11px; color: var(--text3); margin-top: 3px; font-weight: 400; }
.chart-sel {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 11px;
  border-radius: 8px; padding: 5px 9px; cursor: pointer; outline: none;
  font-weight: 500; max-width: 110px;
}
.chart-box { position: relative; height: 160px; }

/* ─── CREDIT ─── */
.credit {
  text-align: center; padding: 10px 0 4px;
  font-size: 11px; color: var(--text3);
}
.credit a { color: var(--gold3); text-decoration: none; font-weight: 600; }

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: calc(74px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--border-gold);
  border-radius: 20px; padding: 9px 18px;
  font-size: 12px; font-weight: 500; color: var(--gold2);
  white-space: nowrap; z-index: 999;
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
#toast.show { opacity: 1; }

/* ─── STATS ROW ─── */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 12px;
}
.stat-lbl { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 7px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: .5px; color: var(--gold2); line-height: 1; margin-bottom: 4px; }
.stat-sub { font-size: 11px; color: var(--text3); }

/* ─── RESPONSIVE ─── */
@media(min-width:480px) {
  body { max-width: 520px; margin: 0 auto; }
}

/* ─── SVG DEFS HIDDEN ─── */
svg.defs { position: absolute; width: 0; height: 0; overflow: hidden; }
</style>
</head>

<div id="toast"></div>

<script>
const SHEET_ID = '1MG7nZhr4L7cORXWL5FTuTPUDn0354bpqlq4RrzZNZQo';
const SHEET_NAME = 'Weekly Engagment';

const PLATS = [
  { key:'linkedin',         label:'LinkedIn',  color:'#0A66C2', icon:'i-linkedin' },
  { key:'youtube',          label:'YouTube',   color:'#FF4444', icon:'i-youtube' },
  { key:'facebook_follows', label:'Facebook',  color:'#1877F2', icon:'i-facebook' },
  { key:'instagram',        label:'Instagram', color:'#E1306C', icon:'i-instagram' },
  { key:'tiktok',           label:'TikTok',    color:'#F4A261', icon:'i-tiktok' },
  { key:'whatsapp',         label:'WhatsApp',  color:'#25D366', icon:'i-whatsapp' },
  { key:'wa_mdcat',         label:'WA MDCAT',  color:'#059669', icon:'i-user' },
  { key:'wa_ecat',          label:'WA ECAT',   color:'#3B82F6', icon:'i-user' },
  { key:'wa_bcat',          label:'WA BCAT',   color:'#A78BFA', icon:'i-user' },
];
const TOT_KEYS = PLATS.map(p => p.key);
let D = [], refreshTimer = null;

const fds = d => d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
const fd  = d => d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
const fn  = n => (n===null||n===undefined) ? '—' : Number(n).toLocaleString();

function pill(cur, prev) {
  if (cur===null||prev===null) return '<span class="pill neu">—</span>';
  const d = cur - prev, cls = d>0?'up':d<0?'dn':'neu', arr = d>0?'▲':d<0?'▼':'→';
  const pct = prev ? ` ${Math.abs(((d/prev)*100)).toFixed(1)}%` : '';
  return `<span class="pill ${cls}">${arr} ${d>=0?'+':''}${Math.abs(d).toLocaleString()}${pct}</span>`;
}

function deltaText(cur, prev) {
  if (cur===null||prev===null) return '<span class="neu">—</span>';
  const d = cur - prev;
  const cls = d>0?'up':d<0?'dn':'neu';
  const arr = d>0?'▲':d<0?'▼':'→';
  return `<span class="${cls}" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.5px;">${arr} ${d>=0?'+':''}${Math.abs(d).toLocaleString()}</span>`;
}

function updateOnlineStatus() {
  const online = navigator.onLine;
  const banner = document.getElementById('offline-banner');
  const extraTop = online ? 0 : 38;
  banner.classList.toggle('show', !online);
  document.body.style.paddingTop = `calc(60px + var(--safe-top) + ${extraTop}px)`;
  if (online && D.length === 0) fetchSheet();
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

let curPage = 'overview';
function goPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === p));
  curPage = p;
  window.scrollTo(0, 0);
}

async function fetchSheet() {
  if (!navigator.onLine) {
    if (D.length === 0) { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('error-screen').style.display = 'flex'; document.getElementById('error-msg').textContent = 'Internet nahi hai.'; }
    return;
  }
  const sp = SHEET_NAME ? `&sheet=${encodeURIComponent(SHEET_NAME)}` : '';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0${sp}&range=A4:K500`;
  try {
    const res = await fetch(url); if (!res.ok) throw new Error('HTTP ' + res.status);
    const txt = await res.text();
    const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/); if (!m) throw new Error('Sheet public nahi hai');
    const json = JSON.parse(m[1]); if (json.status === 'error') throw new Error(json.errors?.[0]?.message || 'Error');
    parseGviz(json); if (!D.length) throw new Error('Data rows nahi mili');
    renderAll();
  } catch(err) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    document.getElementById('error-msg').textContent = err.message;
  }
}

async function silentRefresh() {
  if (!navigator.onLine) return;
  const sp = SHEET_NAME ? `&sheet=${encodeURIComponent(SHEET_NAME)}` : '';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0${sp}&range=A4:K500`;
  try {
    const res = await fetch(url); if (!res.ok) return;
    const txt = await res.text();
    const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/); if (!m) return;
    const json = JSON.parse(m[1]); if (json.status === 'error') return;
    parseGviz(json); if (!D.length) return;
    renderAll();
  } catch(e) {}
}

async function manualRefresh() {
  if (!navigator.onLine) { showToast('Internet nahi hai'); return; }
  showToast('Refreshing...');
  await fetchSheet();
}

function parseGviz(json) {
  D = [];
  for (const row of json.table?.rows || []) {
    const c = row.c || []; if (!c[0]) continue;
    const r0 = c[0]; if (!r0 || r0.v === null || r0.v === undefined) continue;
    let dt = null;
    const tryStr = s => {
      if (!s) return null; s = String(s).trim();
      if (/date|week|linkedin|youtube|platform/i.test(s)) return null;
      let m = s.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/); if (m) return new Date(+m[1], +m[2], +m[3]);
      m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/); if (m) { const d = new Date(+m[3], +m[2]-1, +m[1]); if (!isNaN(d)) return d; }
      m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/); if (m) { const d = new Date(+m[1], +m[2]-1, +m[3]); if (!isNaN(d)) return d; }
      const d2 = new Date(s); if (!isNaN(d2.getTime()) && d2.getFullYear() >= 2020) return d2;
      return null;
    };
    dt = tryStr(r0.v) || tryStr(r0.f);
    if (!dt && typeof r0.v === 'number') { const d = new Date(Math.round((r0.v - 25569) * 86400 * 1000)); if (!isNaN(d.getTime()) && d.getFullYear() >= 2020) dt = d; }
    if (!dt || dt.getFullYear() < 2020) continue;
    const v = cell => { if (!cell || cell.v === null || cell.v === undefined) return null; if (typeof cell.v === 'number') return cell.v; const s = String(cell.v).trim(); if (s==='-'||s===''||s.toLowerCase()==='n/a') return null; const n = parseFloat(s.replace(/[^0-9.-]/g,'')); return isNaN(n) ? null : n; };
    D.push({ date:dt, linkedin:v(c[1]), youtube:v(c[2]), facebook_likes:v(c[3]), facebook_follows:v(c[4]), instagram:v(c[5]), tiktok:v(c[6]), whatsapp:v(c[7]), wa_mdcat:v(c[8]), wa_ecat:v(c[9]), wa_bcat:v(c[10]) });
  }
  D.sort((a, b) => a.date - b.date);
}

function renderAll() {
  const last = D[D.length - 1];
  const dateEl = document.getElementById('tb-date');
  dateEl.textContent = fds(last.date); dateEl.style.display = 'block';
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'none';
  renderOverview(); renderWeekly(); renderMonthly(); renderTrends();
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(silentRefresh, 5 * 60 * 1000);
}

/* ─── OVERVIEW ─── */
function renderOverview() {
  const L = D[D.length-1], P = D.length > 1 ? D[D.length-2] : null;
  const tot = TOT_KEYS.reduce((s,k) => s + (L[k]||0), 0);
  const totP = P ? TOT_KEYS.reduce((s,k) => s + (P[k]||0), 0) : null;
  const tDiff = totP !== null ? tot - totP : null;
  const tCls = tDiff === null ? 'neu' : tDiff > 0 ? 'up' : 'dn';
  const tArr = tDiff === null ? '' : tDiff > 0 ? '▲' : '▼';

  // Top platform
  let topPlat = null, topVal = 0;
  for (const p of PLATS) { if ((L[p.key]||0) > topVal) { topVal = L[p.key]||0; topPlat = p; } }

  let html = `
  <div class="hero-card">
    <div class="hero-label">Total Community</div>
    <div class="hero-num">${tot.toLocaleString()}</div>
    <div class="hero-meta">
      ${tDiff !== null ? `<div class="hero-delta ${tCls}">${tArr} ${tDiff >= 0 ? '+' : ''}${Math.abs(tDiff).toLocaleString()} <span style="font-size:11px;font-weight:400;color:var(--text3)">is hafte</span></div>` : ''}
      <div class="hero-date">${fd(L.date)}</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-lbl">Platforms</div>
      <div class="stat-val">${PLATS.length}</div>
      <div class="stat-sub">active channels</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Top Platform</div>
      <div class="stat-val" style="font-size:20px;color:${topPlat?.color}">${topPlat?.label || '—'}</div>
      <div class="stat-sub">${fn(topVal)} followers</div>
    </div>
  </div>

  <div class="sec-label">Tamam Platforms</div>
  <div class="plat-grid">`;

  for (const p of PLATS) {
    const cur = L[p.key], prv = P ? P[p.key] : null;
    const d = (cur !== null && prv !== null) ? cur - prv : null;
    const cls = d === null ? 'neu' : d > 0 ? 'up' : d < 0 ? 'dn' : 'neu';
    const arr = d === null ? '' : d > 0 ? '▲' : d < 0 ? '▼' : '→';
    html += `
    <div class="plat-card" style="--pc:${p.color};">
      <div class="plat-icon" style="--pc:${p.color};"><svg viewBox="0 0 24 24" style="fill:${p.color}"><use href="#${p.icon}"/></svg></div>
      <div class="plat-name">${p.label}</div>
      <div class="plat-num">${cur !== null ? fn(cur) : '—'}</div>
      <div class="plat-delta ${cls}">${d !== null ? `${arr} ${d >= 0 ? '+' : ''}${Math.abs(d).toLocaleString()}` : '—'}</div>
    </div>`;
  }

  html += `</div>
  <div class="credit">Developed by <a href="https://www.linkedin.com/in/usmankhan07/" target="_blank" rel="noopener">Usman Khan</a></div>`;

  const c = document.getElementById('overview-content');
  c.innerHTML = html; c.style.display = 'flex';
}

/* ─── WEEKLY ─── */
function renderWeekly() {
  const len = D.length;
  const e2 = len >= 1 ? D[len-1] : null;
  const e1 = len >= 2 ? D[len-2] : null;
  const e0 = len >= 3 ? D[len-3] : null;

  let html = `<div class="sec-label">Aakhri 3 Hafte</div>`;

  for (const p of PLATS) {
    const v0 = e0 ? e0[p.key] : null;
    const v1 = e1 ? e1[p.key] : null;
    const v2 = e2 ? e2[p.key] : null;

    html += `<div class="week-card">
      <div class="week-head">
        <div class="week-head-icon" style="background:color-mix(in srgb,${p.color} 15%,transparent);">
          <svg viewBox="0 0 24 24" style="fill:${p.color}"><use href="#${p.icon}"/></svg>
        </div>
        <span class="week-head-name">${p.label}</span>
        ${pill(v2, v1)}
      </div>
      <div class="week-cols">
        <div class="week-col">
          <div class="week-col-date">${e0 ? fds(e0.date) : '—'}</div>
          <div class="week-col-val">${fn(v0)}</div>
        </div>
        <div class="week-col">
          <div class="week-col-date">${e1 ? fds(e1.date) : '—'}</div>
          <div class="week-col-val">${fn(v1)}</div>
        </div>
        <div class="week-col current">
          <div class="week-col-date">Is Hafte</div>
          <div class="week-col-val">${fn(v2)}</div>
        </div>
      </div>
      <div class="week-footer">
        <span class="week-footer-lbl">Tabdili</span>
        <span class="week-footer-val">${deltaText(v2, v1)}</span>
      </div>
    </div>`;
  }

  const diff = (a, b) => (a !== null && b !== null) ? a - b : null;
  const wk2 = e2 && e1 ? TOT_KEYS.reduce((s,k) => s + (diff(e2[k], e1[k]) ?? 0), 0) : null;
  const wk1 = e1 && e0 ? TOT_KEYS.reduce((s,k) => s + (diff(e1[k], e0[k]) ?? 0), 0) : null;
  const wCls = wk2 === null ? 'neu' : wk2 > 0 ? 'up' : wk2 < 0 ? 'dn' : 'neu';

  html += `<div class="growth-box">
    <div class="growth-box-left">
      <div class="growth-label">Is hafte naye followers</div>
      <div class="growth-num ${wCls}">${wk2 !== null ? (wk2 >= 0 ? '+' : '') + Math.abs(wk2).toLocaleString() : '—'}</div>
      ${wk2 !== null && wk1 !== null ? `<div class="growth-sub">Pichle hafte: ${wk1 >= 0 ? '+' : ''}${wk1.toLocaleString()}</div>` : ''}
    </div>
    <div class="growth-icon">
      <svg viewBox="0 0 24 24"><use href="#i-lightning"/></svg>
    </div>
  </div>`;

  document.getElementById('weekly-content').innerHTML = html;
}

/* ─── MONTHLY ─── */
function renderMonthly() {
  const byM = {};
  for (const d of D) {
    const k = `${d.date.getFullYear()}-${String(d.date.getMonth()+1).padStart(2,'0')}`;
    byM[k] = d;
  }
  const months = Object.keys(byM).sort().reverse().slice(0, 6);
  const extra = Object.keys(byM).sort().reverse()[6] || null;

  let html = `<div class="sec-label">Mahina Ba Mahina</div>`;

  for (let i = 0; i < months.length; i++) {
    const cur = byM[months[i]];
    const prevKey = months[i+1] || extra;
    const prev = prevKey ? byM[prevKey] : null;
    const mTot = TOT_KEYS.reduce((s,k) => s + (cur[k]||0), 0);
    const mTotP = prev ? TOT_KEYS.reduce((s,k) => s + (prev[k]||0), 0) : null;
    const mDiff = mTotP !== null ? mTot - mTotP : null;
    const mCls = mDiff === null ? 'neu' : mDiff > 0 ? 'up' : 'dn';

    html += `<div class="month-card">
      <div class="month-header">
        <div class="month-name">${new Date(months[i]+'-02').toLocaleDateString('en-GB', {month:'long', year:'numeric'})}</div>
        <div>
          <div class="month-total-num">${mTot.toLocaleString()}</div>
          ${mDiff !== null ? `<div class="month-total-delta ${mCls}">${mDiff >= 0 ? '▲ +' : '▼ '}${Math.abs(mDiff).toLocaleString()}</div>` : ''}
        </div>
      </div>
      <div class="month-divider"></div>`;

    for (const p of PLATS) {
      const cv = cur[p.key], pv = prev ? prev[p.key] : null;
      const d = (cv !== null && pv !== null) ? cv - pv : null;
      const cls = d === null ? 'neu' : d > 0 ? 'up' : d < 0 ? 'dn' : 'neu';
      html += `<div class="month-row">
        <div class="month-dot" style="background:${p.color}"></div>
        <span class="month-nm">${p.label}</span>
        <span class="month-val">${cv !== null ? cv.toLocaleString() : '—'}</span>
        <span class="month-chg ${cls}">${d !== null ? (d >= 0 ? '▲ +' : '▼ ') + Math.abs(d).toLocaleString() : '—'}</span>
      </div>`;
    }
    html += '</div>';
  }

  document.getElementById('monthly-content').innerHTML = html;
}

/* ─── TRENDS ─── */
let cTrend = null, cDonut = null, cWow = null;

function renderTrends() {
  document.getElementById('trends-content').innerHTML = `
    <div class="sec-label">Growth Charts</div>
    <div class="chart-card">
      <div class="chart-head">
        <div>
          <div class="chart-title">Platform Growth</div>
          <div class="chart-sub">Hafte ba hafte ka record</div>
        </div>
        <select class="chart-sel" id="trend-sel" onchange="updateTrend()">
          <option value="youtube">YouTube</option>
          <option value="linkedin">LinkedIn</option>
          <option value="facebook_follows">Facebook</option>
          <option value="instagram">Instagram</option>
          <option value="tiktok">TikTok</option>
          <option value="whatsapp">WhatsApp</option>
        </select>
      </div>
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-head">
        <div>
          <div class="chart-title">Platform Share</div>
          <div class="chart-sub">Latest distribution</div>
        </div>
      </div>
      <div class="chart-box"><canvas id="donutChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-head">
        <div>
          <div class="chart-title">Weekly New Followers</div>
          <div class="chart-sub">Week-over-week gains</div>
        </div>
      </div>
      <div class="chart-box"><canvas id="wowChart"></canvas></div>
    </div>`;

  setTimeout(() => { updateTrend(); buildDonut(); buildWow(); }, 80);
}

const baseOpts = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: { backgroundColor: '#181818', titleColor: '#F2EEE8', bodyColor: '#888880', borderColor: 'rgba(201,168,76,0.2)', borderWidth: 1, padding: 10, cornerRadius: 8 }
  },
  scales: {
    x: { ticks: { color: '#555550', font: { size: 9, family: 'Outfit' }, maxTicksLimit: 8 }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false } },
    y: { ticks: { color: '#555550', font: { size: 9, family: 'Outfit' } }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false } }
  }
};

function updateTrend() {
  const k = document.getElementById('trend-sel')?.value || 'youtube';
  const fd2 = D.filter(d => d[k] !== null);
  const color = PLATS.find(p => p.key === k)?.color || '#C9A84C';
  if (cTrend) cTrend.destroy();
  const ctx = document.getElementById('trendChart')?.getContext('2d'); if (!ctx) return;
  const g = ctx.createLinearGradient(0, 0, 0, 160);
  g.addColorStop(0, color + '40'); g.addColorStop(1, color + '00');
  cTrend = new Chart(ctx, {
    type: 'line',
    data: {
      labels: fd2.map(d => fds(d.date)),
      datasets: [{ data: fd2.map(d => d[k]), borderColor: color, backgroundColor: g, borderWidth: 2, pointRadius: 2, pointHoverRadius: 5, fill: true, tension: 0.4 }]
    },
    options: baseOpts
  });
}

function buildDonut() {
  const L = D[D.length-1];
  const ks = ['youtube', 'facebook_follows', 'instagram', 'linkedin', 'tiktok', 'whatsapp'];
  if (cDonut) cDonut.destroy();
  const ctx = document.getElementById('donutChart')?.getContext('2d'); if (!ctx) return;
  cDonut = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ks.map(k => PLATS.find(p => p.key === k)?.label || k),
      datasets: [{ data: ks.map(k => L[k] || 0), backgroundColor: ks.map(k => PLATS.find(p => p.key === k)?.color || '#444'), borderWidth: 2, borderColor: '#111111', hoverOffset: 5 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { position: 'right', labels: { color: '#888880', font: { size: 10, family: 'Outfit' }, padding: 8, boxWidth: 8 } },
        tooltip: { backgroundColor: '#181818', titleColor: '#fff', bodyColor: '#888880', borderColor: 'rgba(201,168,76,0.2)', borderWidth: 1, cornerRadius: 8 }
      }
    }
  });
}

function buildWow() {
  const last = D.slice(-11);
  const lbls = last.slice(1).map(d => fds(d.date));
  const mk = k => last.slice(1).map((d, i) => (d[k] !== null && last[i][k] !== null) ? d[k] - last[i][k] : 0);
  if (cWow) cWow.destroy();
  const ctx = document.getElementById('wowChart')?.getContext('2d'); if (!ctx) return;
  cWow = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: lbls,
      datasets: [
        { label: 'YouTube',   data: mk('youtube'),          backgroundColor: '#FF444470', borderRadius: 4 },
        { label: 'Instagram', data: mk('instagram'),        backgroundColor: '#E1306C70', borderRadius: 4 },
        { label: 'Facebook',  data: mk('facebook_follows'), backgroundColor: '#1877F270', borderRadius: 4 },
        { label: 'TikTok',    data: mk('tiktok'),           backgroundColor: '#F4A26170', borderRadius: 4 },
      ]
    },
    options: {
      ...baseOpts,
      plugins: {
        legend: { display: true, labels: { color: '#888880', font: { size: 10, family: 'Outfit' }, boxWidth: 8, padding: 8 } },
        tooltip: baseOpts.plugins.tooltip
      }
    }
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// PWA Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

window.addEventListener('load', () => {
  updateOnlineStatus();
  if (navigator.onLine) fetchSheet();
  else {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    document.getElementById('error-msg').textContent = 'Internet nahi hai. Wi-Fi ya data on karein.';
  }
});
</script>
