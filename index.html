<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Chaajao">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="./manifest.json">
<title>Chaajao Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--maroon:#800000;--maroon2:#A00000;--maroon3:#5A0000;--maroon-dim:rgba(128,0,0,0.08);--maroon-glow:rgba(128,0,0,0.15);--bg:#FFFFFF;--bg2:#FAFAFA;--bg3:#F4F1F1;--bg4:#EDE8E8;--glass:rgba(128,0,0,0.03);--glass2:rgba(128,0,0,0.06);--border:rgba(128,0,0,0.10);--border-m:rgba(128,0,0,0.22);--text:#1A0000;--text2:#6B4040;--text3:#A07070;--green:#187A3A;--red:#C0392B;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:calc(70px + var(--safe-bottom));padding-top:calc(60px + var(--safe-top));font-size:14px;user-select:none;-webkit-user-select:none}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:200px 200px;opacity:.25}

/* LOGIN SCREEN */
#login-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,#1a0000 0%,#3a0000 50%,#1a0000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#login-screen::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");background-size:200px 200px;opacity:.4;pointer-events:none}
.login-box{width:100%;max-width:360px;position:relative;z-index:2}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:40px}
.login-mark{width:72px;height:72px;background:linear-gradient(135deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.15);border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(128,0,0,0.5),0 0 80px rgba(128,0,0,0.2)}
.login-mark svg{width:34px;height:34px;fill:#fff}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;color:#fff}
.login-subtitle{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-top:-8px}
.login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:20px;padding:28px 24px;backdrop-filter:blur(20px)}
.login-label{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.login-input-wrap{position:relative;margin-bottom:8px}
#pwd-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px 48px 14px 16px;font-size:15px;color:#fff;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s,background .2s;letter-spacing:2px}
#pwd-input::placeholder{color:rgba(255,255,255,0.25);letter-spacing:1px}
#pwd-input:focus{border-color:rgba(128,0,0,0.6);background:rgba(255,255,255,0.08)}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);padding:4px;display:flex;align-items:center;justify-content:center}
.eye-btn:hover{color:rgba(255,255,255,0.6)}
.eye-btn svg{width:16px;height:16px;fill:currentColor}
#login-error{font-size:12px;color:#ff6b6b;margin-bottom:14px;display:none;padding:10px 12px;background:rgba(255,50,50,0.10);border:1px solid rgba(255,50,50,0.20);border-radius:8px}
#login-btn{width:100%;background:linear-gradient(135deg,var(--maroon2),var(--maroon3));color:#fff;border:none;border-radius:12px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;font-family:'Outfit',sans-serif;transition:opacity .2s,transform .1s;margin-top:4px}
#login-btn:hover{opacity:.9}
#login-btn:active{transform:scale(.98)}
#login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-attempt-info{text-align:center;margin-top:16px;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:.5px}
.login-lock-icon{text-align:center;margin-top:20px;font-size:11px;color:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;gap:6px}
.login-lock-icon svg{width:12px;height:12px;fill:rgba(255,255,255,0.2)}

/* APP */
#app-wrapper{display:none}
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(60px + var(--safe-top));padding-top:var(--safe-top);background:rgba(255,255,255,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding-left:18px;padding-right:18px;box-shadow:0 1px 12px rgba(128,0,0,0.06)}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--maroon2),var(--maroon3));border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(128,0,0,0.25)}
.brand-mark svg{width:18px;height:18px;fill:#fff}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--maroon)}
.tb-actions{display:flex;align-items:center;gap:6px}
.tb-date{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-weight:500;letter-spacing:.3px}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:active{background:var(--maroon-dim);color:var(--maroon);border-color:var(--border-m)}
.icon-btn svg{width:14px;height:14px;fill:currentColor}
#offline-banner{position:fixed;top:calc(60px + var(--safe-top));left:0;right:0;z-index:199;background:rgba(128,0,0,0.06);border-bottom:1px solid var(--border-m);padding:9px 18px;display:none;align-items:center;gap:8px}
#offline-banner.show{display:flex}
.offline-dot{width:6px;height:6px;border-radius:50%;background:var(--maroon);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.offline-text{font-size:12px;color:var(--maroon);font-weight:500}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:calc(62px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(255,255,255,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:stretch;box-shadow:0 -2px 14px rgba(128,0,0,0.06);overflow-x:auto}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color .2s;font-size:8px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;position:relative;min-width:56px}
.nav-item svg{width:18px;height:18px;fill:currentColor;transition:transform .2s}
.nav-item::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--maroon);transition:width .25s cubic-bezier(.4,0,.2,1);border-radius:0 0 3px 3px}
.nav-item.active{color:var(--maroon)}
.nav-item.active::after{width:24px}
.nav-item.active svg{transform:translateY(-1px)}
.nav-item:active{opacity:.6}
.page{display:none;flex-direction:column;gap:14px;padding:16px 14px;position:relative;z-index:1}
.page.active{display:flex;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:20px;text-align:center;padding:40px}
.spinner-wrap{position:relative;width:44px;height:44px}
.spinner-ring{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-m);border-top-color:var(--maroon);animation:spin .8s linear infinite;position:absolute;inset:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-dot{width:8px;height:8px;border-radius:50%;background:var(--maroon);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 12px rgba(128,0,0,0.4)}
.loading-title{font-size:15px;font-weight:500;color:var(--text2)}
.loading-sub{font-size:12px;color:var(--text3);font-family:'Bebas Neue',sans-serif;letter-spacing:3px}
#error-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:14px;text-align:center;padding:40px}
.error-icon{font-size:40px}
.error-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--text)}
.error-msg{font-size:13px;color:var(--text2);max-width:260px;line-height:1.7}
.btn-retry{background:linear-gradient(135deg,var(--maroon2),var(--maroon3));color:#fff;border:none;border-radius:10px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px;margin-top:6px;box-shadow:0 4px 20px rgba(128,0,0,0.25)}
.sec-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--text3);padding:0 2px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.hero-card{background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon3) 100%);border-radius:18px;padding:24px 22px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(128,0,0,0.22)}
.hero-card::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,0.10) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.hero-label{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:10px}
.hero-num{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:-1px;line-height:1;color:#fff}
.hero-meta{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.hero-delta{font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px}
.hero-date{font-size:11px;color:rgba(255,255,255,0.5);margin-left:auto;font-weight:500}
.plat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.plat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 11px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.plat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pc,#555);opacity:.85}
.plat-icon{width:28px;height:28px;border-radius:7px;background:color-mix(in srgb,var(--pc,#555) 12%,transparent);display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.plat-icon svg{width:14px;height:14px;fill:var(--pc,#800000)}
.plat-name{font-size:10px;color:var(--text2);font-weight:500;margin-bottom:5px;letter-spacing:.2px}
.plat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.5px;color:var(--text);line-height:1;margin-bottom:5px}
.plat-delta{font-size:10px;font-weight:600}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--text3)}
.pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.pill.up{background:rgba(24,122,58,0.10);color:var(--green)}
.pill.dn{background:rgba(192,57,43,0.10);color:var(--red)}
.pill.neu{background:var(--bg4);color:var(--text3)}
.week-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
.week-head{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.week-head-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.week-head-icon svg{width:15px;height:15px}
.week-head-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.week-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.week-col{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.week-col.current{background:linear-gradient(135deg,rgba(128,0,0,0.07),rgba(128,0,0,0.02));border-color:var(--border-m)}
.week-col-date{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.week-col.current .week-col-date{color:var(--maroon3)}
.week-col-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);letter-spacing:.5px}
.week-col.current .week-col-val{font-size:22px;color:var(--maroon)}
.week-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.week-footer-lbl{font-size:11px;color:var(--text3);font-weight:500}
.week-footer-val{font-size:14px;font-weight:700}
.growth-box{background:linear-gradient(135deg,rgba(128,0,0,0.06),rgba(128,0,0,0.02));border:1px solid var(--border-m);border-radius:14px;padding:20px 18px;display:flex;align-items:center;justify-content:space-between}
.growth-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px}
.growth-num{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;line-height:1}
.growth-sub{font-size:11px;color:var(--text3);margin-top:5px}
.growth-icon{width:52px;height:52px;border-radius:50%;background:rgba(128,0,0,0.08);border:1px solid var(--border-m);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.growth-icon svg{width:24px;height:24px;fill:var(--maroon)}
.month-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
.month-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.month-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--maroon)}
.month-total-num{font-size:14px;font-weight:700;color:var(--text);text-align:right}
.month-total-delta{font-size:11px;font-weight:600;text-align:right}
.month-divider{height:1px;background:var(--border);margin:8px 0}
.month-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.month-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.month-nm{font-size:12px;color:var(--text2);flex:1;font-weight:400}
.month-val{font-size:12px;font-weight:600;color:var(--text);min-width:60px;text-align:right}
.month-chg{font-size:11px;font-weight:600;min-width:70px;text-align:right}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
.chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.chart-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--maroon)}
.chart-sub{font-size:11px;color:var(--text3);margin-top:3px;font-weight:400}
.chart-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:11px;border-radius:8px;padding:5px 9px;cursor:pointer;outline:none;font-weight:500;max-width:110px}
.chart-box{position:relative;height:160px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 12px}
.stat-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.5px;color:var(--maroon);line-height:1;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--text3)}
.proj-hero{background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon3) 100%);border-radius:18px;padding:22px 20px;box-shadow:0 8px 32px rgba(128,0,0,0.20);position:relative;overflow:hidden}
.proj-hero::before{content:'';position:absolute;bottom:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.proj-hero-label{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px}
.proj-hero-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;margin-bottom:4px}
.proj-hero-sub{font-size:12px;color:rgba(255,255,255,0.6)}
.proj-rate-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.proj-rate-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 12px}
.proj-rate-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.proj-rate-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--maroon);line-height:1;margin-bottom:3px}
.proj-rate-sub{font-size:11px;color:var(--text3)}
.proj-chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
.proj-chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.proj-chart-box{position:relative;height:180px}
.proj-days-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.proj-day-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px 11px;text-align:center;position:relative;overflow:hidden}
.proj-day-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--maroon2),var(--maroon3));opacity:var(--op,.5)}
.proj-day-badge{display:inline-block;background:rgba(128,0,0,0.08);color:var(--maroon3);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.proj-day-num{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.5px;color:var(--text);line-height:1;margin-bottom:4px}
.proj-day-gain{font-size:11px;font-weight:600;color:var(--green)}
.proj-table-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
.proj-table-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--maroon);margin-bottom:14px}
.proj-table{width:100%;border-collapse:collapse}
.proj-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:0 6px 8px 0;text-align:left;border-bottom:1px solid var(--border)}
.proj-table th:not(:first-child){text-align:right}
.proj-table td{font-size:11px;padding:7px 6px 7px 0;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.proj-table td:first-child{display:flex;align-items:center;gap:6px;font-weight:500;color:var(--text)}
.proj-table td:not(:first-child){text-align:right;font-weight:600}
.proj-table tr:last-child td{border-bottom:none}
.proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.proj-rate-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:rgba(128,0,0,0.08);color:var(--maroon3);white-space:nowrap}
.page-footer{text-align:center;padding:12px 0 4px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:4px}
.page-footer a{color:var(--maroon);text-decoration:none;font-weight:600}
#toast{position:fixed;bottom:calc(74px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--maroon);border-radius:20px;padding:9px 18px;font-size:12px;font-weight:500;color:#fff;white-space:nowrap;z-index:999;box-shadow:0 4px 24px rgba(128,0,0,0.3);opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}
@media(min-width:480px){body{max-width:520px;margin:0 auto}}
svg.defs{position:absolute;width:0;height:0;overflow:hidden}

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-mark">
        <svg viewBox="0 0 24 24"><use href="#i-lightning"/></svg>
      </div>
      <div class="login-title">CHAAJAO</div>
      <div class="login-subtitle">Analytics Dashboard</div>
    </div>
    <div class="login-card">
      <div class="login-label">Password</div>
      <div class="login-input-wrap">
        <input type="password" id="pwd-input" placeholder="Password daalen..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="eye-btn" id="eye-toggle" onclick="toggleEye()">
          <svg viewBox="0 0 24 24"><use href="#i-eye" id="eye-icon"/></svg>
        </button>
      </div>
      <div id="login-error"></div>
      <button id="login-btn" onclick="attemptLogin()">Login</button>
    </div>
    <div class="login-lock-icon">
      <svg viewBox="0 0 24 24"><use href="#i-lock"/></svg>
      <span>Secured &amp; Protected</span>
    </div>
  </div>
</div>

<!-- APP WRAPPER -->
<div id="app-wrapper">
  <div id="offline-banner">
    <div class="offline-dot"></div>
    <span class="offline-text">Offline — last saved data show ho raha hai</span>
  </div>
  <div id="topbar">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24"><use href="#i-lightning"/></svg></div>
      <div class="brand-name">CHAAJAO</div>
    </div>
    <div class="tb-actions">
      <span class="tb-date" id="tb-date" style="display:none"></span>
      <button class="icon-btn" onclick="manualRefresh()" title="Refresh">
        <svg viewBox="0 0 24 24"><use href="#i-refresh"/></svg>
      </button>
    </div>
  </div>
  <div id="page-overview" class="page active">
    <div id="loading-screen">
      <div class="spinner-wrap"><div class="spinner-ring"></div><div class="spinner-dot"></div></div>
      <div class="loading-title">Data load ho raha hai...</div>
      <div class="loading-sub">Chaajao Analytics</div>
    </div>
    <div id="error-screen">
      <div class="error-icon">📡</div>
      <div class="error-title">Data nahi mila</div>
      <div class="error-msg" id="error-msg">Sheet se connect nahi ho saka.</div>
      <button class="btn-retry" onclick="manualRefresh()">Dobara Try Karein</button>
    </div>
    <div id="overview-content" style="display:none;flex-direction:column;gap:14px;"></div>
  </div>
  <div id="page-weekly"    class="page"><div id="weekly-content"    style="flex-direction:column;gap:14px;display:flex;"></div></div>
  <div id="page-monthly"   class="page"><div id="monthly-content"   style="flex-direction:column;gap:14px;display:flex;"></div></div>
  <div id="page-trends"    class="page"><div id="trends-content"    style="flex-direction:column;gap:14px;display:flex;"></div></div>
  <div id="page-projection"class="page"><div id="projection-content"style="flex-direction:column;gap:14px;display:flex;"></div></div>
  <nav id="bottom-nav">
    <button class="nav-item active" data-page="overview"   onclick="goPage('overview')"><svg viewBox="0 0 24 24"><use href="#i-home"/></svg>Overview</button>
    <button class="nav-item"        data-page="weekly"     onclick="goPage('weekly')"><svg viewBox="0 0 24 24"><use href="#i-calendar"/></svg>Weekly</button>
    <button class="nav-item"        data-page="monthly"    onclick="goPage('monthly')"><svg viewBox="0 0 24 24"><use href="#i-bar"/></svg>Monthly</button>
    <button class="nav-item"        data-page="trends"     onclick="goPage('trends')"><svg viewBox="0 0 24 24"><use href="#i-trend"/></svg>Trends</button>
    <button class="nav-item"        data-page="projection" onclick="goPage('projection')"><svg viewBox="0 0 24 24"><use href="#i-proj"/></svg>Forecast</button>
  </nav>
</div>

  const inp=document.getElementById('pwd-input');
  const ic=document.getElementById('eye-icon');
  if(inp.type==='password'){inp.type='text';ic.setAttribute('href','#i-eye-off');}
  else{inp.type='password';ic.setAttribute('href','#i-eye');}
