<style>
:root{--maroon:#800000;--maroon2:#A00000;--maroon3:#5A0000;--maroon-dim:rgba(128,0,0,0.08);--bg:#FFFFFF;--bg2:#FAFAFA;--bg3:#F4F1F1;--bg4:#EDE8E8;--border:rgba(128,0,0,0.10);--border-m:rgba(128,0,0,0.22);--text:#1A0000;--text2:#6B4040;--text3:#A07070;--green:#187A3A;--red:#C0392B;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:calc(70px + var(--safe-bottom));padding-top:calc(60px + var(--safe-top));font-size:14px;-webkit-user-select:none;user-select:none}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:200px 200px;opacity:.25}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,#0d0000 0%,#2a0000 45%,#1a0000 100%);display:flex;align-items:center;justify-content:center;padding:24px}
#login-screen::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%, rgba(128,0,0,0.35) 0%, transparent 65%)}
.lbox{width:100%;max-width:340px;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0}
.lbrand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px}
.lmark{width:68px;height:68px;border-radius:20px;background:rgba(128,0,0,0.25);border:1px solid rgba(128,0,0,0.5);display:flex;align-items:center;justify-content:center;box-shadow:0 0 48px rgba(128,0,0,0.4),0 0 96px rgba(128,0,0,0.15)}
.lmark svg{width:30px;height:30px;fill:#fff}
.ltitle{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:7px;color:#fff}
.lsub{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:3px;text-transform:uppercase;margin-top:-6px}
.lcard{width:100%;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:26px 22px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.llabel{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:9px;font-weight:600}
.linput-wrap{position:relative;margin-bottom:6px}
#pwd-input{width:100%;background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.10);border-radius:11px;padding:13px 46px 13px 15px;font-size:16px;color:#fff;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:3px;-webkit-text-security:disc}

#pwd-input:focus{border-color:rgba(160,0,0,0.7);box-shadow:0 0 0 3px rgba(128,0,0,0.15)}
.leye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;color:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;transition:color .15s}
.leye:hover{color:rgba(255,255,255,0.65)}
.leye svg{width:17px;height:17px;fill:currentColor}
#lerr{font-size:12px;color:#ff7070;margin-bottom:12px;display:none;padding:9px 12px;background:rgba(255,60,60,0.09);border:1px solid rgba(255,60,60,0.18);border-radius:8px;line-height:1.5}
#lbtn{width:100%;background:linear-gradient(135deg,#A00000,#5A0000);color:#fff;border:none;border-radius:11px;padding:14px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;font-family:'Outfit',sans-serif;transition:opacity .2s,transform .1s;margin-top:2px;box-shadow:0 4px 24px rgba(128,0,0,0.3)}
#lbtn:hover{opacity:.88}
#lbtn:active{transform:scale(.98)}

.lfoot{margin-top:18px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.13)}
.lfoot svg{width:11px;height:11px;fill:rgba(255,255,255,0.18)}

/* ── APP ── */
#app-wrap{display:none}
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(60px + var(--safe-top));padding-top:var(--safe-top);background:rgba(255,255,255,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding-left:18px;padding-right:18px;box-shadow:0 1px 12px rgba(128,0,0,0.06)}

.tb-actions{display:flex;align-items:center;gap:6px}
.tb-date{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-weight:500}

.offline-dot{width:6px;height:6px;border-radius:50%;background:var(--maroon);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.offline-text{font-size:12px;color:var(--maroon);font-weight:500}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:calc(62px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(255,255,255,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:stretch;box-shadow:0 -2px 14px rgba(128,0,0,0.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color .2s;font-size:8px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;position:relative;min-width:56px}
.nav-item svg{width:18px;height:18px;fill:currentColor;transition:transform .2s}
.nav-item::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--maroon);transition:width .25s cubic-bezier(.4,0,.2,1);border-radius:0 0 3px 3px}
.nav-item.active{color:var(--maroon)}.nav-item.active::after{width:24px}.nav-item.active svg{transform:translateY(-1px)}.nav-item:active{opacity:.6}
.page{display:none;flex-direction:column;gap:14px;padding:16px 14px;position:relative;z-index:1}
.page.active{display:flex;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:20px;text-align:center;padding:40px}
.spinner-wrap{position:relative;width:44px;height:44px}
.spinner-ring{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-m);border-top-color:var(--maroon);animation:spin .8s linear infinite;position:absolute;inset:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-dot{width:8px;height:8px;border-radius:50%;background:var(--maroon);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 12px rgba(128,0,0,0.4)}
.loading-title{font-size:15px;font-weight:500;color:var(--text2)}.loading-sub{font-size:12px;color:var(--text3);font-family:'Bebas Neue',sans-serif;letter-spacing:3px}
#error-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:14px;text-align:center;padding:40px}
.error-icon{font-size:40px}.error-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--text)}.error-msg{font-size:13px;color:var(--text2);max-width:260px;line-height:1.7}
.btn-retry{background:linear-gradient(135deg,var(--maroon2),var(--maroon3));color:#fff;border:none;border-radius:10px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px;margin-top:6px;box-shadow:0 4px 20px rgba(128,0,0,0.25)}
.sec-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--text3);padding:0 2px;display:flex;align-items:center;gap:10px}.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.hero-card{background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon3) 100%);border-radius:18px;padding:24px 22px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(128,0,0,0.22)}.hero-card::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,0.10) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.hero-label{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:10px}
.hero-num{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:-1px;line-height:1;color:#fff}
.hero-meta{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}.hero-delta{font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px}.hero-date{font-size:11px;color:rgba(255,255,255,0.5);margin-left:auto;font-weight:500}
.plat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.plat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 11px;position:relative;overflow:hidden}.plat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pc,#555);opacity:.85}
.plat-icon{width:28px;height:28px;border-radius:7px;background:color-mix(in srgb,var(--pc,#555) 12%,transparent);display:flex;align-items:center;justify-content:center;margin-bottom:9px}.plat-icon svg{width:14px;height:14px}
.plat-name{font-size:10px;color:var(--text2);font-weight:500;margin-bottom:5px}.plat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);line-height:1;margin-bottom:5px}.plat-delta{font-size:10px;font-weight:600}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--text3)}
.pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}.pill.up{background:rgba(24,122,58,0.10);color:var(--green)}.pill.dn{background:rgba(192,57,43,0.10);color:var(--red)}.pill.neu{background:var(--bg4);color:var(--text3)}
.week-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
.week-head{display:flex;align-items:center;gap:9px;margin-bottom:14px}.week-head-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.week-head-icon svg{width:15px;height:15px}.week-head-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.week-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.week-col{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}.week-col.current{background:linear-gradient(135deg,rgba(128,0,0,0.07),rgba(128,0,0,0.02));border-color:var(--border-m)}
.week-col-date{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}.week-col.current .week-col-date{color:var(--maroon3)}.week-col-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text)}.week-col.current .week-col-val{font-size:22px;color:var(--maroon)}
.week-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}.week-footer-lbl{font-size:11px;color:var(--text3);font-weight:500}.week-footer-val{font-size:14px;font-weight:700}
.growth-box{background:linear-gradient(135deg,rgba(128,0,0,0.06),rgba(128,0,0,0.02));border:1px solid var(--border-m);border-radius:14px;padding:20px 18px;display:flex;align-items:center;justify-content:space-between}
.growth-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px}.growth-num{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;line-height:1}.growth-sub{font-size:11px;color:var(--text3);margin-top:5px}
.growth-icon{width:52px;height:52px;border-radius:50%;background:rgba(128,0,0,0.08);border:1px solid var(--border-m);display:flex;align-items:center;justify-content:center;flex-shrink:0}.growth-icon svg{width:24px;height:24px;fill:var(--maroon)}
.month-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}.month-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}.month-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--maroon)}.month-total-num{font-size:14px;font-weight:700;color:var(--text);text-align:right}.month-total-delta{font-size:11px;font-weight:600;text-align:right}
.month-divider{height:1px;background:var(--border);margin:8px 0}.month-row{display:flex;align-items:center;gap:8px;padding:5px 0}.month-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}.month-nm{font-size:12px;color:var(--text2);flex:1}.month-val{font-size:12px;font-weight:600;color:var(--text);min-width:60px;text-align:right}.month-chg{font-size:11px;font-weight:600;min-width:70px;text-align:right}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}.chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}.chart-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--maroon)}.chart-sub{font-size:11px;color:var(--text3);margin-top:3px}.chart-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:11px;border-radius:8px;padding:5px 9px;cursor:pointer;outline:none;font-weight:500;max-width:110px}.chart-box{position:relative;height:160px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 12px}.stat-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--maroon);line-height:1;margin-bottom:4px}.stat-sub{font-size:11px;color:var(--text3)}
.proj-hero{background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon3) 100%);border-radius:18px;padding:22px 20px;box-shadow:0 8px 32px rgba(128,0,0,0.20);position:relative;overflow:hidden}.proj-hero::before{content:'';position:absolute;bottom:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.proj-hero-label{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px}.proj-hero-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;margin-bottom:4px}.proj-hero-sub{font-size:12px;color:rgba(255,255,255,0.6)}
.proj-rate-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}.proj-rate-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 12px}.proj-rate-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}.proj-rate-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--maroon);line-height:1;margin-bottom:3px}.proj-rate-sub{font-size:11px;color:var(--text3)}
.proj-chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}.proj-chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}.proj-chart-box{position:relative;height:180px}
.proj-days-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}.proj-day-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px 11px;text-align:center;position:relative;overflow:hidden}.proj-day-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--maroon2),var(--maroon3));opacity:var(--op,.5)}.proj-day-badge{display:inline-block;background:rgba(128,0,0,0.08);color:var(--maroon3);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}.proj-day-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);line-height:1;margin-bottom:4px}.proj-day-gain{font-size:11px;font-weight:600;color:var(--green)}
.proj-table-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px}.proj-table-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--maroon);margin-bottom:14px}.proj-table{width:100%;border-collapse:collapse}.proj-table th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:0 6px 8px 0;text-align:left;border-bottom:1px solid var(--border)}.proj-table th:not(:first-child){text-align:right}.proj-table td{font-size:11px;padding:7px 6px 7px 0;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}.proj-table td:first-child{display:flex;align-items:center;gap:6px;font-weight:500;color:var(--text)}.proj-table td:not(:first-child){text-align:right;font-weight:600}.proj-table tr:last-child td{border-bottom:none}.proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.proj-rate-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:rgba(128,0,0,0.08);color:var(--maroon3);white-space:nowrap}
.page-footer{text-align:center;padding:12px 0 4px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:4px}.page-footer a{color:var(--maroon);text-decoration:none;font-weight:600}
#toast{position:fixed;bottom:calc(74px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--maroon);border-radius:20px;padding:9px 18px;font-size:12px;font-weight:500;color:#fff;white-space:nowrap;z-index:999;box-shadow:0 4px 24px rgba(128,0,0,0.3);opacity:0;transition:opacity .2s;pointer-events:none}#toast.show{opacity:1}
@media(min-width:480px){body{max-width:520px;margin:0 auto}}
svg.defs{position:absolute;width:0;height:0;overflow:hidden}
</style>

<!-- SECURITY + AUTH (clear, not obfuscated so functions work) -->
<script>
(function(){
  // ── DevTools Block ──
  var _dt=false;
  function _ck(){
    if(window.outerWidth-window.innerWidth>160||window.outerHeight-window.innerHeight>160){
      if(!_dt){_dt=true;document.body.innerHTML='<div style="position:fixed;inset:0;background:#0d0000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;"><div style="font-size:52px;">🔒</div><div style="color:#800000;font-family:monospace;font-size:20px;letter-spacing:4px;font-weight:700;">ACCESS DENIED</div><div style="color:rgba(255,255,255,0.3);font-size:13px;letter-spacing:1px;">Developer tools detect kiye gaye</div></div>';}}
    else{if(_dt){_dt=false;location.reload();}}
  }
  setInterval(_ck,600);
  // Right-click disable
  document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
  // Key block: F12, Ctrl+Shift+I/J/C, Ctrl+U, Ctrl+S
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&'IJC'.includes(e.key))||(e.ctrlKey&&'uUsS'.includes(e.key))){e.preventDefault();return false;}
  });
})();

// ── Auth ──
var _fc=0,_lk=0;

async function _hash(s){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

function _gsess(){
  try{var s=sessionStorage.getItem('_cja');if(!s)return null;var d=JSON.parse(atob(s));if(Date.now()>d.e){sessionStorage.removeItem('_cja');return null;}return d;}catch(e){return null;}
}
function _ssess(){
  sessionStorage.setItem('_cja',btoa(JSON.stringify({a:1,e:Date.now()+4*3600*1000})));
}

function _showErr(m){
  var el=document.getElementById('lerr');
  if(el){el.textContent=m;el.style.display='block';}
}

async function _doLogin(){
  var now=Date.now();
  if(now<_lk){_showErr((Math.ceil((_lk-now)/1000))+' seconds baad try karein');return;}
  var inp=document.getElementById('pwd-input');
  if(!inp)return;
  var val=inp.value;
  if(!val){_showErr('Password daalen');return;}
  var btn=document.getElementById('lbtn');
  btn.disabled=true;btn.textContent='...';
  var h=await _hash(val);
  var rh=await _hash('chaajao');
  if(h===rh){
    _fc=0;_ssess();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-wrap').style.display='block';
    if(typeof updateOnlineStatus==='function')updateOnlineStatus();
    if(typeof fetchSheet==='function')fetchSheet();
  } else {
    _fc++;
    btn.disabled=false;btn.textContent='Login';
    inp.value='';inp.focus();
    if(_fc>=5){_lk=Date.now()+30000;_fc=0;_showErr('5 galat koshish — 30 seconds wait karein');}
    else{_showErr('Galat password — '+(5-_fc)+' koshish baqi hain');}
  }
}

// ── Eye toggle ──
function _toggleEye(){
  var inp=document.getElementById('pwd-input');
  var ic=document.getElementById('eye-icon');
  if(inp.type==='password'){inp.type='text';ic.setAttribute('href','#i-eye-off');}
  else{inp.type='password';ic.setAttribute('href','#i-eye');}
}

// ── Wire up events after DOM ready ──
document.addEventListener('DOMContentLoaded',function(){
  var btn=document.getElementById('lbtn');
  if(btn)btn.addEventListener('click',_doLogin);

  var inp=document.getElementById('pwd-input');
  if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter')_doLogin();});

  var eye=document.getElementById('eye-btn');
  if(eye)eye.addEventListener('click',_toggleEye);

  // Nav
  document.querySelectorAll('.nav-item').forEach(function(b){
    b.addEventListener('click',function(){if(typeof goPage==='function')goPage(b.dataset.page);});
  });
  // Refresh
  var rb=document.getElementById('refresh-btn');
  if(rb)rb.addEventListener('click',function(){if(typeof manualRefresh==='function')manualRefresh();});
  // Retry
  var rtb=document.getElementById('retry-btn');
  if(rtb)rtb.addEventListener('click',function(){if(typeof manualRefresh==='function')manualRefresh();});

  // Check existing session
  if(_gsess()){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-wrap').style.display='block';
  }
});
</script>
