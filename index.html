<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaajao — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08080f;
    color: #fff;
    font-family: 'Inter', sans-serif;
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* subtle grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(120,90,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,90,255,0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .orb {
    position: fixed; border-radius: 50%; pointer-events: none;
    filter: blur(100px); z-index: 0;
  }
  .o1 { width: 500px; height: 500px; background: rgba(110,70,255,0.15); top: -200px; left: -100px; }
  .o2 { width: 400px; height: 400px; background: rgba(0,220,150,0.08); bottom: -150px; right: -100px; }

  .center { position: relative; z-index: 1; text-align: center; width: 100%; padding: 0 24px; }

  /* LIVE DOT */
  .live-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 28px;
  }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%; background: #ff3b3b;
    animation: pulse 1.4s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,59,59,0.7); }
    70% { box-shadow: 0 0 0 10px rgba(255,59,59,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,59,59,0); }
  }
  .live-label { font-size: 12px; font-weight: 500; color: #ff3b3b; letter-spacing: 0.1em; }

  /* HEADING */
  h1 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 800; line-height: 1.1;
    letter-spacing: -1.5px; margin-bottom: 12px;
  }
  h1 .g {
    background: linear-gradient(90deg, #a98aff, #00e5a0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub {
    font-size: clamp(14px, 2vw, 18px);
    color: rgba(200,190,255,0.5); margin-bottom: 40px;
  }

  /* VIDEO */
  #video-wrap {
    width: min(840px, 92vw); margin: 0 auto;
    border-radius: 16px; overflow: hidden;
    border: 1px solid rgba(120,90,255,0.2);
    background: #0d0d20;
    position: relative;
  }
  #video-inner { position: relative; padding-top: 56.25%; }
  #yt-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

  /* TIMER FALLBACK */
  #timer-wrap {
    display: none;
    position: absolute; inset: 0;
    background: #0d0d20;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #timer-wrap.show { display: flex; }
  .timer-msg { font-size: 14px; color: rgba(200,190,255,0.5); }
  .timer-digits {
    font-family: 'Sora', sans-serif;
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(90deg, #a98aff, #00e5a0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .timer-sub { font-size: 13px; color: rgba(200,190,255,0.4); }

  /* brand footer */
  .brand {
    margin-top: 24px;
    font-family: 'Sora', sans-serif;
    font-size: 13px; color: rgba(200,190,255,0.25);
    letter-spacing: 0.05em;
  }
  .brand span { color: rgba(0,229,160,0.4); }
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="center">
  <div class="live-row">
    <div class="live-dot" id="live-dot"></div>
    <span class="live-label" id="live-label">LIVE NOW</span>
  </div>

  <h1>Chaajao App<br><span class="g">New Version Reveal</span></h1>
  <p class="sub" id="sub-text">MDCAT 2026 · Live Session</p>

  <div id="video-wrap">
    <div id="video-inner">
      <iframe id="yt-frame"
        src="https://www.youtube.com/embed/5QfmfJySn44?si=7zC5yfnsqCVWw04o&autoplay=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
      <div id="timer-wrap">
        <p class="timer-msg" id="timer-msg">Session shuru hone mein</p>
        <div class="timer-digits" id="countdown">--:--:--</div>
        <p class="timer-sub">Aaj · Friday 17 April · 7:15 PM</p>
      </div>
    </div>
  </div>

  <p class="brand">chaajao<span>.com</span></p>
</div>

<script>
  // Target: today 7:15 PM Pakistan Standard Time (UTC+5)
  function getTarget() {
    const now = new Date();
    const pk = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Karachi' }));
    const target = new Date(pk);
    target.setHours(19, 15, 0, 0);
    // convert back to UTC offset
    const diff = now - pk;
    return new Date(target.getTime() + diff);
  }

  const target = getTarget();
  const dot = document.getElementById('live-dot');
  const label = document.getElementById('live-label');
  const subText = document.getElementById('sub-text');
  const timerWrap = document.getElementById('timer-wrap');
  const timerMsg = document.getElementById('timer-msg');
  const countdown = document.getElementById('countdown');
  const ytFrame = document.getElementById('yt-frame');

  function pad(n) { return String(n).padStart(2, '0'); }

  function showTimer(before) {
    timerWrap.classList.add('show');
    ytFrame.style.opacity = '0';
    dot.style.background = before ? '#f5c842' : '#ff3b3b';
    label.style.color = before ? '#f5c842' : '#ff3b3b';
    label.textContent = before ? 'COMING SOON' : 'STREAM ISSUE — REJOINING';
    subText.textContent = before ? 'Aaj 7:15 PM Pakistan Time' : 'Thodi dair mein wapas aajayega';
    timerMsg.textContent = before ? 'Session shuru hone mein' : 'Estimated resume in';
  }

  function hideTimer() {
    timerWrap.classList.remove('show');
    ytFrame.style.opacity = '1';
    dot.style.background = '#ff3b3b';
    label.style.color = '#ff3b3b';
    label.textContent = 'LIVE NOW';
    subText.textContent = 'MDCAT 2026 · Live Session';
  }

  let streamOk = true;
  let streamCheckFail = 0;

  function tick() {
    const now = new Date();
    const diff = target - now;

    if (diff > 0) {
      // Before session
      showTimer(true);
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      countdown.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    } else {
      // Session time — show stream, but watch for errors
      if (streamOk) {
        hideTimer();
        countdown.textContent = '00:00:00';
      } else {
        // stream issue — show live countdown (time since session start)
        showTimer(false);
        const gone = Math.abs(diff);
        const h = Math.floor(gone / 3600000);
        const m = Math.floor((gone % 3600000) / 60000);
        const s = Math.floor((gone % 60000) / 1000);
        countdown.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
      }
    }
  }

  // Detect YouTube frame errors (CSP/network)
  ytFrame.addEventListener('error', () => {
    streamOk = false;
  });

  // Fallback: if iframe stays blank (no load event in 12s after session time)
  setTimeout(() => {
    const now = new Date();
    if (now >= target) {
      try {
        const doc = ytFrame.contentDocument;
        if (!doc || doc.body?.innerHTML === '') {
          streamOk = false;
        }
      } catch(e) {
        // cross-origin = likely loaded fine, leave it
      }
    }
  }, 12000);

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
